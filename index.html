<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VANTIXIO | AI Biometric Analysis</title>
    <meta property="og:title" content="VANTIXIO | AI Glowup Rating">
    <meta property="og:description" content="What is your aesthetic potential? Get your AI rating now.">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --green: #00E676; 
            --bg: #000; 
            --card: #121212; 
            --text-secondary: #888;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 380px; }

        .logo { 
            text-align: center; 
            font-weight: 800; 
            font-size: 1.5rem; 
            margin-bottom: 30px; 
            letter-spacing: -1px;
        }
        .logo span { color: var(--green); }

        .upload-box { 
            background: var(--card); 
            border: 1px solid #222; 
            border-radius: 30px; 
            aspect-ratio: 1/1.2; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            cursor: pointer; 
            position: relative;
            transition: transform 0.3s ease;
        }
        
        .upload-box:active { transform: scale(0.98); }

        #preview { width: 100%; height: 100%; object-fit: cover; display: none; }

        .scan-line { 
            position: absolute; 
            width: 100%; 
            height: 4px; 
            background: var(--green); 
            box-shadow: 0 0 20px var(--green); 
            top: 0; 
            display: none; 
            animation: scan 2s infinite linear; 
            z-index: 10;
        }

        @keyframes scan { 
            0% { top: 0; } 
            100% { top: 100%; } 
        }

        .btn { 
            background: #fff; 
            color: #000; 
            width: 100%; 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 800; 
            border: none; 
            margin-top: 20px; 
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-share {
            background: var(--green);
            color: #000;
            margin-top: 12px;
        }

        #results { display: none; margin-top: 30px; animation: fadeIn 0.5s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .score-card { 
            background: var(--card); 
            padding: 25px; 
            border-radius: 25px; 
            margin-bottom: 15px; 
            text-align: center;
            border: 1px solid #222;
        }

        .score-label { font-size: 0.7rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .score-value { font-size: 3rem; font-weight: 800; }

        .tips-container { margin-top: 20px; }
        .tip-item { 
            background: #1a1a1a; 
            padding: 18px; 
            border-radius: 20px; 
            margin-bottom: 12px; 
            border-left: 4px solid var(--green); 
            font-size: 0.85rem; 
            line-height: 1.5;
        }

        #upload-text { text-align: center; color: var(--text-secondary); font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">VANTI<span>XIO</span></div>

        <div class="upload-box" onclick="document.getElementById('fileIn').click()">
            <div id="scanner" class="scan-line"></div>
            <img id="preview">
            <div id="upload-text">✦ CLICK TO UPLOAD PORTRAIT</div>
            <input type="file" id="fileIn" hidden accept="image/*" onchange="showPreview(this)">
        </div>

        <button class="btn" id="actionBtn" onclick="startAnalysis()">ANALYZE BIOMETRICS</button>

        <div id="results">
            <div class="score-card">
                <div class="score-label">Potential Aesthetic Rating</div>
                <div id="score" class="score-value">0</div>
            </div>

            <div id="tips-list" class="tips-container">
                </div>

            <button class="btn btn-share" onclick="shareResults()">SHARE MY GLOWUP 🚀</button>
        </div>
    </div>

    <script>
        function showPreview(input) {
            if (input.files[0]) {
                const reader = new FileReader();
                reader.onload = e => {
                    const preview = document.getElementById('preview');
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                    document.getElementById('upload-text').style.display = 'none';
                    // Reset UI if they upload a new photo
                    document.getElementById('results').style.display = 'none';
                    document.getElementById('actionBtn').style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        async function startAnalysis() {
            const file = document.getElementById('fileIn').files[0];
            if (!file) return alert("Please upload a photo first.");

            const btn = document.getElementById('actionBtn');
            const scanner = document.getElementById('scanner');
            
            // UI States
            btn.disabled = true;
            btn.innerText = "EXTRACTING DATA...";
            scanner.style.display = "block";

            // 1. Convert to small Base64 for the AI
            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            try {
                // 2. Call your Vercel Brain (api/analyze.js)
                const response = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image: base64 })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                // 3. Display Results
                document.getElementById('score').innerText = data.overall;
                document.getElementById('tips-list').innerHTML = data.tips.map(tip => `
                    <div class="tip-item">${tip}</div>
                `).join('');

                document.getElementById('results').style.display = 'block';
                btn.style.display = 'none';

            } catch (err) {
                alert(err.message);
                btn.innerText = "RETRY ANALYSIS";
                btn.disabled = false;
            } finally {
                scanner.style.display = "none";
            }
        }

        async function shareResults() {
            const score = document.getElementById('score').innerText;
            const shareData = {
                title: 'VANTIXIO AI Report',
                text: `My aesthetic potential is ${score}/100 according to VANTIXIO AI. Scan yours here:`,
                url: window.location.href
            };

            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(`${shareData.text} ${shareData.url}`);
                    alert("Results copied to clipboard! Paste it on your story.");
                }
            } catch (err) {
                console.log("Share failed", err);
            }
        }
    </script>
</body>
</html>
